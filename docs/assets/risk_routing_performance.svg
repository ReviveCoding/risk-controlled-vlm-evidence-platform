<rect x="42" y="504" width="1116" height="82" class="callout"/>
<text x="70.0" y="532.0" class="callout-label" text-anchor="start">Selected operating point: 20% human-review capacity</text>
<text x="70.0" y="562.0" class="callout-value" text-anchor="start">660 → 593</text>
<text x="224.0" y="562.0" class="callout-detail" text-anchor="start">10.2% lower residual weighted risk</text>
<text x="570.0" y="562.0" class="callout-value" text-anchor="start">41.6% → 48.9%</text>
<text x="774.0" y="562.0" class="callout-detail" text-anchor="start">+7.4 pp critical-error capture</text>
<text x="70.0" y="580.0" class="callout-detail" text-anchor="start">Paired bootstrap residual-risk difference: 95% CI [-133.00, -13.95]</text>
