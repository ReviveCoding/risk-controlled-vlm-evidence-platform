name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  linux-test:
    name: linux-py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Record runner environment
        run: |
          {
            echo "### Runner environment"
            echo "- OS: $RUNNER_OS"
            echo "- Architecture: $RUNNER_ARCH"
            echo "- Image: ${ImageOS:-unknown} ${ImageVersion:-unknown}"
            echo "- Python: $(python --version)"
          } >> "$GITHUB_STEP_SUMMARY"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[api,dev,datasets]"
      - run: python -m pip check
      - run: python -m ruff check .
      - run: python -m ruff format --check .
      - run: python -m mypy src/control_evidence
      - run: python -m pytest --cov=control_evidence --cov-report=term-missing --cov-report=xml --cov-fail-under=80
      - run: python -m control_evidence.cli full-pipeline --root .ci-run --run-id linux-${{ matrix.python-version }}
      - name: Upload test evidence
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: linux-py${{ matrix.python-version }}-evidence
          path: |
            coverage.xml
            .ci-run/outputs/runs/linux-${{ matrix.python-version }}/release_gate.json
          if-no-files-found: warn

  windows-test:
    name: windows-py${{ matrix.python-version }}
    runs-on: windows-latest
    timeout-minutes: 35
    defaults:
      run:
        shell: pwsh
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Record runner environment
        run: |
          "### Runner environment" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "- OS: $env:RUNNER_OS" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "- Architecture: $env:RUNNER_ARCH" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "- Image: $env:ImageOS $env:ImageVersion" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "- Python: $(python --version)" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[api,dev,datasets]"
      - run: python -m pip check
      - run: python -m ruff check .
      - run: python -m ruff format --check .
      - run: python -m mypy src/control_evidence
      - run: python -m pytest -q
      - run: python -m control_evidence.cli full-pipeline --root .ci-run --run-id windows-${{ matrix.python-version }}
      - name: Upload Windows evidence
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: windows-py${{ matrix.python-version }}-evidence
          path: .ci-run/outputs/runs/windows-${{ matrix.python-version }}/release_gate.json
          if-no-files-found: warn

  qualification-parity:
    name: local-parity-extended
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[api,dev,datasets]"
      - run: bash scripts/qualify_local.sh standard
      - name: Upload qualification evidence
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: qualification-manifest
          path: |
            qualification_manifest.json
            reports/qualification_logs/
          if-no-files-found: error

  runtime-network:
    name: runtime-network-py3.13
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[api,dev]"
      - run: python scripts/qualify_runtime.py --output reports/runtime_qualification.json --work-dir reports/runtime_work
      - name: Upload runtime evidence
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: runtime-network-evidence
          path: reports/runtime_qualification.json
          if-no-files-found: error

  api-legacy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]" "fastapi==0.128.8" "starlette==0.50.0" "httpx==0.28.1"
      - run: python -m pip check
      - run: python -m pytest -q tests/test_api.py

  package:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: python -m pip install --upgrade pip build
      - run: python -m build
      - run: python -m venv /tmp/wheel-smoke
      - run: /tmp/wheel-smoke/bin/pip install dist/*.whl "fastapi>=0.137,<1" "uvicorn>=0.30,<1" "httpx2>=2.4,<3"
      - run: /tmp/wheel-smoke/bin/pip check
      - run: |
          expected_version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          test "$(/tmp/wheel-smoke/bin/control-evidence version)" = "$expected_version"
      - working-directory: /tmp
        run: /tmp/wheel-smoke/bin/control-evidence full-pipeline --root /tmp/wheel-run --run-id ci-wheel
      - working-directory: /tmp
        run: |
          /tmp/wheel-smoke/bin/python - <<'PY'
          from pathlib import Path
          from fastapi.testclient import TestClient
          from control_evidence.api import create_app
          with TestClient(create_app(state_dir=Path('/tmp/api-state'), idempotency_max_records=2)) as client:
              assert client.get('/health').status_code == 200
              assert client.get('/ready').status_code == 200
          PY
      - uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: python-distributions
          path: dist/
          if-no-files-found: error

  dependency-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: python -m pip install --upgrade pip pip-audit
      - run: python -m pip install -e ".[api,datasets]"
      - run: pip-audit --strict .

  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - run: docker build --tag risk-controlled-vlm-evidence-platform:ci .
